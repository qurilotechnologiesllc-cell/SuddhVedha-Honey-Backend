<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Socket Test</title>

<style>

body{
    font-family:Arial;
    background:#f5f5f5;
    padding:30px;
}

h2{
    color:#333;
}

#status{
    margin-bottom:20px;
    color:green;
    font-weight:bold;
}

.card{
    background:white;
    padding:15px;
    border-radius:10px;
    margin-bottom:15px;
    box-shadow:0 2px 10px rgba(0,0,0,.1);
}

</style>

</head>
<body>

<h2>Admin Socket Test</h2>

<div id="status">
Connecting...
</div>

<div id="notifications"></div>

<script src="/socket.io/socket.io.js"></script>

<script>

const socket=io();

socket.on("connect",()=>{

    document.getElementById("status").innerHTML=
    "🟢 Connected : "+socket.id;

    socket.emit("join-admin-room");

});

socket.on("disconnect",()=>{

    document.getElementById("status").innerHTML=
    "🔴 Disconnected";

});

socket.on("new-enquiry",(data)=>{

    console.log(data);

    const div=document.createElement("div");

    div.className="card";

    div.innerHTML=`

        <h3>New Bulk Enquiry</h3>

        <p><b>Name :</b> ${data.fullname}</p>

        <p><b>Email :</b> ${data.businessEmail}</p>

        <p><b>Quantity :</b> ${data.expectedQuantity}</p>

        <p>${new Date(data.createdAt).toLocaleString()}</p>

    `;

    document
        .getElementById("notifications")
        .prepend(div);

});

</script>

</body>
</html>
